<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼び出し案内 — Queue Display</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#071d3a;color:#fff;font-family:'Noto Sans JP',sans-serif;}
@keyframes numPulse{0%,100%{opacity:1}50%{opacity:.75}}
@keyframes flashIn{0%{background:rgba(100,200,255,.2)}100%{background:transparent}}
.flash{animation:flashIn 1.5s ease-out}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;display:inline-block;transition:background .3s}
.sync-dot.ok{background:#2ecc71}
.sync-dot.err{background:#e74c3c}

/* ═══════════════ PC / サイネージ ═══════════════ */
@media (min-width:600px){
  html,body{overflow:hidden}

  /* メインレイアウト: ヘッダー(固定高) + 診療科(残り) */
  .layout{
    display:flex;flex-direction:column;
    height:100vh;
  }
  .header{
    flex:0 0 auto;
    background:linear-gradient(135deg,#0f3a7a,#1a56a0 60%,#1e6ab0);
    padding:12px 28px 10px;
    display:flex;flex-direction:column;justify-content:center;gap:6px;
    position:relative;overflow:hidden;
  }
  .header::before{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
  .header-top{display:flex;align-items:baseline;gap:16px}
  .header-label{font-size:11px;letter-spacing:.14em;color:#90bde0;text-transform:uppercase;white-space:nowrap}
  .header-label-en{font-size:10px;color:#5a9fc8;margin-left:8px}
  /* 番号: vhとvwの小さい方を採用してはみ出しを防ぐ */
  .current-num{
    font-family:'DM Mono',monospace;
    font-size:min(18vh,14vw,96px);
    font-weight:700;line-height:1;letter-spacing:.04em;color:#fff;
  }
  .header-dept{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .dept-calling-ja{font-size:clamp(14px,2.2vh,22px);font-weight:700;color:#fff}
  .dept-calling-en{font-size:clamp(12px,1.8vh,18px);color:#7ab3e0}

  /* 診療科エリア: 残り全部 */
  .depts{flex:1 1 0;min-height:0;display:flex;flex-direction:column;}
  .dept-row{display:flex;align-items:stretch;border-top:1px solid rgba(255,255,255,.08);flex:1;min-height:0}
  .dept-row:last-child{border-bottom:1px solid rgba(255,255,255,.08)}
  .dept-label-col{
    width:160px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;
    padding:6px 18px;border-right:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.14)
  }
  .dept-ja{font-size:clamp(14px,2vw,22px);font-weight:700;letter-spacing:.06em;color:#fff}
  .dept-en{font-size:clamp(9px,1.1vw,13px);color:#6a9fc0;letter-spacing:.06em;margin-top:2px}
  .dept-info-col{flex:1;min-width:0;display:flex;align-items:center;padding:6px 22px;gap:22px;flex-wrap:wrap}
  .calling-block,.next-block{display:flex;flex-direction:column;gap:2px}
  .calling-lbl-ja,.next-lbl-ja{font-size:clamp(9px,1vw,12px);color:#7ab3e0}
  .calling-lbl-en,.next-lbl-en{font-size:clamp(8px,.9vw,10px);color:#4a7a9a}
  .calling-num{font-family:'DM Mono',monospace;font-size:clamp(26px,4vw,54px);font-weight:700;color:#fff;line-height:1;animation:numPulse 2s infinite}
  .divider{width:1px;height:32px;background:rgba(255,255,255,.12);flex-shrink:0}
  .next-num{font-family:'DM Mono',monospace;font-size:clamp(18px,2.8vw,36px);font-weight:500;color:#a0cce8}
  .wait-tag{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:1px 8px;font-size:clamp(8px,.9vw,11px);color:#7ab3e0;margin-top:3px}
  .empty-msg{font-size:clamp(11px,1.4vw,16px);color:rgba(255,255,255,.2);font-style:italic}

  /* フッター: 時刻のみ — 右下固定 */
  .footer{display:none} /* フッターdivは非表示 */

  /* 時刻: 左下に固定表示 */
  .clock-fixed{
    position:fixed;bottom:12px;left:20px;
    display:flex;align-items:center;gap:10px;
    z-index:100;
  }
  .clock-time{font-family:'DM Mono',monospace;font-size:clamp(16px,2.2vw,28px);font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.06em}
  .clock-date{font-size:clamp(9px,1vw,12px);color:rgba(255,255,255,.35)}
  .clock-sync{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.25)}

  /* QR: 右下に完全固定 — レイアウトに依存しない */
  .qr-fixed{
    position:fixed;
    bottom:12px;right:16px;
    background:#fff;
    padding:6px;border-radius:8px;
    line-height:0;
    z-index:100;
    box-shadow:0 4px 20px rgba(0,0,0,.4);
  }
  .qr-label{
    position:fixed;
    bottom:10px;right:128px;
    text-align:right;
    z-index:100;
  }
  .qr-label .ql1{font-size:clamp(10px,1.2vw,13px);font-weight:700;color:rgba(255,255,255,.7);margin-bottom:2px}
  .qr-label .ql2{font-size:clamp(8px,.9vw,11px);color:rgba(255,255,255,.4)}
}

/* ═══════════════ スマホ ═══════════════ */
@media (max-width:599px){
  html,body{overflow-y:auto;min-height:100%}
  .layout{display:flex;flex-direction:column;min-height:100vh}
  .header{background:linear-gradient(135deg,#0f3a7a,#1a56a0);padding:16px 18px 12px;display:flex;flex-direction:column;gap:6px}
  .header-top{display:flex;align-items:baseline;gap:10px}
  .header-label{font-size:10px;letter-spacing:.1em;color:#90bde0;text-transform:uppercase}
  .header-label-en{font-size:9px;color:#5a9fc8;margin-left:6px}
  .current-num{font-family:'DM Mono',monospace;font-size:22vw;font-weight:700;line-height:1;color:#fff;text-align:center;width:100%;margin:4px 0}
  .header-dept{text-align:center}
  .dept-calling-ja{font-size:5vw;font-weight:700;color:#fff}
  .dept-calling-en{font-size:3.5vw;color:#7ab3e0;margin-top:2px}
  .depts{flex:1;display:flex;flex-direction:column}
  .dept-row{display:flex;flex-direction:column;border-top:1px solid rgba(255,255,255,.07)}
  .dept-label-col{padding:8px 16px 5px;background:rgba(0,0,0,.18);display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.06)}
  .dept-ja{font-size:5vw;font-weight:700;color:#fff}
  .dept-en{font-size:3vw;color:#6a9fc0}
  .dept-info-col{display:flex;align-items:center;padding:8px 16px;gap:18px;flex-wrap:wrap}
  .calling-block,.next-block{display:flex;flex-direction:column;gap:2px}
  .calling-lbl-ja,.next-lbl-ja{font-size:10px;color:#7ab3e0}
  .calling-lbl-en,.next-lbl-en{font-size:9px;color:#4a7a9a}
  .calling-num{font-family:'DM Mono',monospace;font-size:14vw;font-weight:700;color:#fff;line-height:1;animation:numPulse 2s infinite}
  .divider{width:1px;height:32px;background:rgba(255,255,255,.12);flex-shrink:0}
  .next-num{font-family:'DM Mono',monospace;font-size:8vw;font-weight:500;color:#a0cce8}
  .wait-tag{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:1px 8px;font-size:10px;color:#7ab3e0;margin-top:2px}
  .empty-msg{font-size:13px;color:rgba(255,255,255,.22);font-style:italic}
  .footer{background:rgba(0,0,0,.3);border-top:1px solid rgba(255,255,255,.07);padding:8px 16px;display:flex;align-items:center;gap:10px}
  .clock-time{font-family:'DM Mono',monospace;font-size:5.5vw;font-weight:700;color:rgba(255,255,255,.7)}
  .clock-date{font-size:9px;color:rgba(255,255,255,.35)}
  .clock-sync{display:flex;align-items:center;gap:4px;font-size:9px;color:rgba(255,255,255,.25);margin-left:auto}
  /* スマホではQR固定パネル非表示 */
  .qr-fixed,.qr-label,.clock-fixed{display:none}
}
</style>
</head>
<body>

<div class="layout">
  <div class="header" id="header-area">
    <div class="header-top">
      <div class="header-label">現在の呼び出し番号<span class="header-label-en">Now Calling</span></div>
    </div>
    <div class="current-num" id="main-num">—</div>
    <div class="header-dept" id="header-dept" style="display:none">
      <div class="dept-calling-ja" id="hd-ja"></div>
      <div class="dept-calling-en" id="hd-en"></div>
    </div>
  </div>

  <div class="depts">
    <div class="dept-row">
      <div class="dept-label-col"><div class="dept-ja">内　科</div><div class="dept-en">Internal Medicine</div></div>
      <div class="dept-info-col" id="info-nai"><span class="empty-msg">待機なし / No patients waiting</span></div>
    </div>
    <div class="dept-row">
      <div class="dept-label-col"><div class="dept-ja">外　科</div><div class="dept-en">Surgery</div></div>
      <div class="dept-info-col" id="info-geka"><span class="empty-msg">待機なし / No patients waiting</span></div>
    </div>
    <div class="dept-row">
      <div class="dept-label-col"><div class="dept-ja">整形外科</div><div class="dept-en">Orthopedics</div></div>
      <div class="dept-info-col" id="info-seikei"><span class="empty-msg">待機なし / No patients waiting</span></div>
    </div>
  </div>

  <!-- スマホ用フッター -->
  <div class="footer">
    <div class="clock-time" id="clock-time-sp">--:--</div>
    <div class="clock-date" id="clock-date-sp"></div>
    <div class="clock-sync"><span class="sync-dot" id="sync-dot-sp"></span> Firebase</div>
  </div>
</div>

<!-- PC用: QRコードを右下に固定表示（レイアウト外） -->
<div class="qr-label">
  <div class="ql1">スマホで確認 / Scan to view</div>
  <div class="ql2">QRコードを読み取ってください</div>
</div>
<div class="qr-fixed" id="qr-fixed"></div>

<!-- PC用: 時刻・同期を左下に固定表示 -->
<div class="clock-fixed">
  <div>
    <div class="clock-time" id="clock-time-pc">--:--</div>
    <div class="clock-date" id="clock-date-pc"></div>
  </div>
  <div class="clock-sync"><span class="sync-dot" id="sync-dot-pc"></span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
const FB_URL      = 'https://hospital-queue-56585-default-rtdb.firebaseio.com/queue.json';
const SIGNAGE_URL = 'https://sshiromaru.github.io/hospital/signage.html';
const pad = n => String(n).padStart(3, '0');
const deptInfo = {
  nai:    { ja:'内科',    en:'Internal Medicine' },
  geka:   { ja:'外科',    en:'Surgery'           },
  seikei: { ja:'整形外科', en:'Orthopedics'       }
};
const weekJA = ['日','月','火','水','木','金','土'];
const weekEN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let prevKey = null;

function toArray(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.keys(v).sort((a,b)=>Number(a)-Number(b)).map(k=>v[k]);
}

function setSyncDot(cls) {
  ['sync-dot-pc','sync-dot-sp'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'sync-dot ' + cls;
  });
}

async function loadFromFB() {
  try {
    const res = await fetch(FB_URL, { cache:'no-store' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const d = data || {};
    const st = {
      nextNum:    d.nextNum || 1,
      unassigned: toArray(d.unassigned),
      queues: {
        nai:    toArray(d.queues && d.queues.nai),
        geka:   toArray(d.queues && d.queues.geka),
        seikei: toArray(d.queues && d.queues.seikei),
      },
      called: {
        nai:    (d.called && d.called.nai)    || null,
        geka:   (d.called && d.called.geka)   || null,
        seikei: (d.called && d.called.seikei) || null,
      },
      lastCalled: d.lastCalled || { num:null, dept:null }
    };
    render(st);
    setSyncDot('ok');
  } catch(e) {
    setSyncDot('err');
    console.error('FB fetch error:', e);
  }
}

function render(st) {
  const mn = document.getElementById('main-num');
  const hd = document.getElementById('header-dept');
  if (st.lastCalled && st.lastCalled.num) {
    const d = st.lastCalled.dept;
    mn.textContent = pad(st.lastCalled.num);
    document.getElementById('hd-ja').textContent = deptInfo[d].ja + 'へお越しください';
    document.getElementById('hd-en').textContent = 'Please proceed to ' + deptInfo[d].en;
    hd.style.display = 'block';
    const key = st.lastCalled.num + '-' + d;
    if (key !== prevKey) {
      const ha = document.getElementById('header-area');
      ha.classList.remove('flash'); void ha.offsetWidth; ha.classList.add('flash');
      prevKey = key;
    }
  } else { mn.textContent = '—'; hd.style.display = 'none'; }

  ['nai','geka','seikei'].forEach(d => {
    const el = document.getElementById('info-' + d);
    const parts = [];
    if (st.called && st.called[d]) {
      parts.push('<div class="calling-block"><div class="calling-lbl-ja">呼び出し中</div><div class="calling-lbl-en">Now Calling</div><div class="calling-num">' + pad(st.called[d]) + '</div></div>');
    }
    if (st.queues && st.queues[d] && st.queues[d].length) {
      if (parts.length) parts.push('<div class="divider"></div>');
      const nxt = st.queues[d][0], wait = st.queues[d].length * 5;
      parts.push('<div class="next-block"><div class="next-lbl-ja">次の番号</div><div class="next-lbl-en">Next Number</div><div class="next-num">' + pad(nxt) + '</div><div class="wait-tag">約' + wait + '分 / Approx. ' + wait + ' min</div></div>');
    }
    el.innerHTML = parts.length ? parts.join('') : '<span class="empty-msg">待機なし / No patients waiting</span>';
  });
}

function tick() {
  const now = new Date(), wd = now.getDay();
  const t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const dt = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' (' + weekJA[wd] + '/' + weekEN[wd] + ')';
  const tp = document.getElementById('clock-time-pc'); if(tp) tp.textContent = t;
  const dp = document.getElementById('clock-date-pc'); if(dp) dp.textContent = dt;
  const ts = document.getElementById('clock-time-sp'); if(ts) ts.textContent = t;
  const ds = document.getElementById('clock-date-sp'); if(ds) ds.textContent = dt;
}

function buildQR() {
  const wrap = document.getElementById('qr-fixed');
  if (!wrap) return;
  wrap.innerHTML = '';
  const size = 96;
  if (typeof QRCode !== 'undefined') {
    new QRCode(wrap, { text:SIGNAGE_URL, width:size, height:size,
      colorDark:'#000000', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
  } else {
    const img = document.createElement('img');
    img.src = 'https://chart.googleapis.com/chart?cht=qr&chs=' + size + 'x' + size + '&chld=M|1&chl=' + encodeURIComponent(SIGNAGE_URL);
    img.width = size; img.height = size; img.alt = 'QR';
    wrap.appendChild(img);
  }
}

window.addEventListener('load', buildQR);
tick();
setInterval(tick, 1000);
loadFromFB();
setInterval(loadFromFB, 5000);
</script>
</body>
</html>
