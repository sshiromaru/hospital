<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼び出し案内 — Queue Display</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#071d3a;color:#fff;font-family:'Noto Sans JP',sans-serif;overflow:hidden}

/* Layout */
.layout{display:grid;grid-template-rows:auto 1fr auto;height:100vh;min-height:500px}

/* Header — current number */
.header{background:linear-gradient(135deg,#0f3a7a 0%,#1a56a0 60%,#1e6ab0 100%);padding:24px 32px 20px;display:flex;align-items:center;gap:32px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;right:-60px;top:-60px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.04)}
.header-left{flex:1}
.header-label{font-size:13px;letter-spacing:.18em;color:#90bde0;text-transform:uppercase;margin-bottom:4px}
.header-label-en{font-size:11px;letter-spacing:.12em;color:#5a9fc8;display:block;margin-top:1px}
.current-num{font-family:'DM Mono',monospace;font-size:clamp(72px,12vw,120px);font-weight:700;line-height:1;letter-spacing:.04em;color:#fff;text-shadow:0 0 60px rgba(100,180,255,.3)}
.header-dept{margin-left:auto;text-align:right;z-index:1}
.dept-calling-ja{font-size:clamp(18px,3vw,28px);font-weight:700;color:#fff;letter-spacing:.04em}
.dept-calling-en{font-size:clamp(13px,2vw,18px);color:#7ab3e0;letter-spacing:.06em;margin-top:4px}
.pulse-ring{width:16px;height:16px;border-radius:50%;background:#4af;display:inline-block;margin-right:8px;animation:ring 1.5s infinite}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(100,200,255,.6)}70%{box-shadow:0 0 0 10px rgba(100,200,255,0)}100%{box-shadow:0 0 0 0 rgba(100,200,255,0)}}

/* Department rows */
.depts{display:flex;flex-direction:column;justify-content:space-evenly;padding:0}
.dept-row{display:flex;align-items:stretch;border-top:1px solid rgba(255,255,255,.07);flex:1}
.dept-row:last-child{border-bottom:1px solid rgba(255,255,255,.07)}
.dept-label-col{width:180px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:16px 24px;border-right:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.12)}
.dept-ja{font-size:clamp(18px,2.5vw,26px);font-weight:700;letter-spacing:.06em;color:#fff}
.dept-en{font-size:clamp(11px,1.4vw,15px);color:#6a9fc0;letter-spacing:.08em;margin-top:3px}
.dept-info-col{flex:1;display:flex;align-items:center;padding:16px 28px;gap:32px;flex-wrap:wrap}

.calling-block{display:flex;flex-direction:column;gap:3px}
.calling-lbl-ja{font-size:clamp(11px,1.2vw,13px);color:#7ab3e0;letter-spacing:.06em}
.calling-lbl-en{font-size:clamp(10px,1vw,11px);color:#4a7a9a;letter-spacing:.06em}
.calling-num{font-family:'DM Mono',monospace;font-size:clamp(36px,6vw,64px);font-weight:700;color:#fff;letter-spacing:.06em;line-height:1;animation:numPulse 2s infinite}
@keyframes numPulse{0%,100%{opacity:1}50%{opacity:.75}}

.divider{width:1px;height:48px;background:rgba(255,255,255,.12);flex-shrink:0}

.next-block{display:flex;flex-direction:column;gap:3px}
.next-lbl-ja{font-size:clamp(11px,1.2vw,13px);color:#6a9fc0;letter-spacing:.06em}
.next-lbl-en{font-size:clamp(10px,1vw,11px);color:#3a6a8a;letter-spacing:.06em}
.next-num{font-family:'DM Mono',monospace;font-size:clamp(24px,3.5vw,40px);font-weight:500;color:#a0cce8}
.wait-tag{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:2px 10px;font-size:clamp(10px,1.2vw,13px);color:#7ab3e0;margin-top:4px}

.empty-msg{font-size:clamp(14px,1.8vw,18px);color:rgba(255,255,255,.2);font-style:italic}

/* QR + Footer */
.footer{background:rgba(0,0,0,.3);border-top:1px solid rgba(255,255,255,.07);padding:14px 28px;display:flex;align-items:center;gap:20px}
.qr-wrap{background:#fff;padding:6px;border-radius:8px;flex-shrink:0}
.footer-text{flex:1}
.footer-text .ft1{font-size:clamp(13px,1.8vw,16px);font-weight:700;color:#fff;margin-bottom:3px}
.footer-text .ft2{font-size:clamp(10px,1.3vw,13px);color:#6090b0}
.footer-text .ft3{font-size:clamp(10px,1.1vw,11px);color:#3a6080;margin-top:2px;font-family:'DM Mono',monospace}
.clock{text-align:right;flex-shrink:0}
.clock-time{font-family:'DM Mono',monospace;font-size:clamp(22px,3vw,36px);font-weight:700;color:#fff;letter-spacing:.06em}
.clock-date{font-size:clamp(10px,1.3vw,13px);color:#5a8aaa;margin-top:2px}

/* Flash animation on new call */
@keyframes flashIn{0%{background:rgba(100,200,255,.15)}100%{background:transparent}}
.flash{animation:flashIn 1.5s ease-out}
</style>
</head>
<body>
<div class="layout">

  <!-- Current number header -->
  <div class="header" id="header-area">
    <div class="header-left">
      <div class="header-label">現在の呼び出し番号
        <span class="header-label-en">Now Calling — Please Proceed to the Counter</span>
      </div>
      <div class="current-num" id="main-num">—</div>
    </div>
    <div class="header-dept" id="header-dept" style="display:none">
      <div class="dept-calling-ja" id="hd-ja"></div>
      <div class="dept-calling-en" id="hd-en"></div>
    </div>
  </div>

  <!-- Department rows -->
  <div class="depts">
    <!-- 内科 -->
    <div class="dept-row" id="row-nai">
      <div class="dept-label-col">
        <div class="dept-ja">内　科</div>
        <div class="dept-en">Internal Medicine</div>
      </div>
      <div class="dept-info-col" id="info-nai">
        <span class="empty-msg">待機なし / No patients waiting</span>
      </div>
    </div>
    <!-- 外科 -->
    <div class="dept-row" id="row-geka">
      <div class="dept-label-col">
        <div class="dept-ja">外　科</div>
        <div class="dept-en">Surgery</div>
      </div>
      <div class="dept-info-col" id="info-geka">
        <span class="empty-msg">待機なし / No patients waiting</span>
      </div>
    </div>
    <!-- 整形外科 -->
    <div class="dept-row" id="row-seikei">
      <div class="dept-label-col">
        <div class="dept-ja">整形外科</div>
        <div class="dept-en">Orthopedics</div>
      </div>
      <div class="dept-info-col" id="info-seikei">
        <span class="empty-msg">待機なし / No patients waiting</span>
      </div>
    </div>
  </div>

  <!-- Footer with QR -->
  <div class="footer">
    <div class="qr-wrap"><canvas id="qr-canvas" width="72" height="72"></canvas></div>
    <div class="footer-text">
      <div class="ft1">スマホで待ち状況を確認 / Check waiting status on your phone</div>
      <div class="ft2">QRコードを読み取ってください / Scan QR code with your camera</div>
      <div class="ft3" id="url-label"></div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock-time">00:00</div>
      <div class="clock-date" id="clock-date"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const STORE_KEY='hq_state';
const pad=n=>String(n).padStart(3,'0');
const deptInfo={
  nai:{ja:'内科',en:'Internal Medicine'},
  geka:{ja:'外科',en:'Surgery'},
  seikei:{ja:'整形外科',en:'Orthopedics'}
};
const weekdays=['日','月','火','水','木','金','土'];
const weekdaysEn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let prevLastCalled=null;

function loadState(){
  try{const s=localStorage.getItem(STORE_KEY);return s?JSON.parse(s):null;}catch{return null;}
}
function defaultState(){return{nextNum:1,unassigned:[],queues:{nai:[],geka:[],seikei:[]},called:{nai:null,geka:null,seikei:null},lastCalled:{num:null,dept:null}};}

function render(){
  const st=loadState()||defaultState();

  // Main header
  const mn=document.getElementById('main-num');
  const hd=document.getElementById('header-dept');
  const hdJa=document.getElementById('hd-ja');
  const hdEn=document.getElementById('hd-en');
  if(st.lastCalled&&st.lastCalled.num){
    const d=st.lastCalled.dept;
    mn.textContent=pad(st.lastCalled.num);
    hdJa.textContent=deptInfo[d].ja+'へお越しください';
    hdEn.textContent='Please proceed to '+deptInfo[d].en;
    hd.style.display='block';
    // Flash if new
    const key=st.lastCalled.num+'-'+st.lastCalled.dept;
    if(key!==prevLastCalled){
      document.getElementById('header-area').classList.remove('flash');
      void document.getElementById('header-area').offsetWidth;
      document.getElementById('header-area').classList.add('flash');
      prevLastCalled=key;
    }
  } else {
    mn.textContent='—';hd.style.display='none';
  }

  // Dept rows
  ['nai','geka','seikei'].forEach(d=>{
    const el=document.getElementById('info-'+d);
    const parts=[];
    if(st.called&&st.called[d]){
      parts.push(`
        <div class="calling-block">
          <div class="calling-lbl-ja">呼び出し中</div>
          <div class="calling-lbl-en">Now Calling</div>
          <div class="calling-num">${pad(st.called[d])}</div>
        </div>
      `);
    }
    if(st.queues&&st.queues[d]&&st.queues[d].length){
      if(parts.length)parts.push('<div class="divider"></div>');
      const next=st.queues[d][0];
      const wait=st.queues[d].length*5;
      parts.push(`
        <div class="next-block">
          <div class="next-lbl-ja">次の番号</div>
          <div class="next-lbl-en">Next Number</div>
          <div class="next-num">${pad(next)}</div>
          <div class="wait-tag">約${wait}分待ち / Approx. ${wait} min wait</div>
        </div>
      `);
    }
    el.innerHTML=parts.length?parts.join(''):'<span class="empty-msg">待機なし / No patients waiting</span>';
  });
}

// Clock
function updateClock(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-time').textContent=hh+':'+mm;
  const wd=now.getDay();
  const dateStr=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} (${weekdays[wd]}/${weekdaysEn[wd]})`;
  document.getElementById('clock-date').textContent=dateStr;
}

// QR
function generateQR(){
  const canvas=document.getElementById('qr-canvas');
  const url=location.href;
  document.getElementById('url-label').textContent=url.length>55?url.slice(0,55)+'…':url;
  if(typeof QRCode!=='undefined'){
    QRCode.toCanvas(canvas,url,{width:72,margin:0,color:{dark:'#000',light:'#fff'}},()=>{});
  }
}

window.addEventListener('storage',e=>{if(e.key===STORE_KEY)render();});
render();
updateClock();
setInterval(updateClock,1000);
setInterval(render,3000);
window.addEventListener('load',()=>{setTimeout(generateQR,300);});
</script>
</body>
</html>
