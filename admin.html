<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受付管理画面 — Hospital Queue Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a56a0;--blue-light:#e8f0fb;--blue-dark:#0c3266;
  --green:#0e6e50;--green-light:#e6f5ee;
  --amber:#8a4f0a;--amber-light:#fdf0e0;
  --bg:#f4f6fa;--surface:#fff;--border:#dde3ef;
  --text:#1a1f2e;--muted:#6b7796;
  --radius:10px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--blue-dark);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{color:#fff;font-size:16px;font-weight:500;letter-spacing:.04em}
header span{color:#8fb4d8;font-size:13px}
.badge{background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:2px 10px;border-radius:20px;margin-left:auto}
.badge.ok{background:#1a7a3a}
.badge.err{background:#a32d2d}
.badge.saving{background:#7a6a00}
main{max-width:900px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.issue-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.issue-left .label{font-size:12px;color:var(--muted);margin-bottom:4px}
.issue-left .num{font-family:'DM Mono',monospace;font-size:48px;font-weight:500;color:var(--blue);letter-spacing:.06em;line-height:1}
.issue-right{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.btn-issue{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:background .15s;letter-spacing:.04em}
.btn-issue:hover{background:var(--blue-dark)}
.btn-issue:disabled{opacity:.5;cursor:not-allowed}
.stats{display:flex;gap:16px}
.stat{text-align:center}
.stat .n{font-size:20px;font-weight:700;color:var(--text)}
.stat .l{font-size:11px;color:var(--muted)}
.section-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.pool-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 18px}
.pool{display:flex;flex-wrap:wrap;gap:8px;min-height:36px}
.ticket{display:inline-flex;align-items:center;gap:8px;background:#f0f3fa;border:1px solid #dde3ef;border-radius:8px;padding:6px 10px}
.ticket .tnum{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text)}
.assign-btns{display:flex;gap:4px}
.abt{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid;background:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all .12s}
.abt.nai{color:var(--blue);border-color:#85aae0}.abt.nai:hover{background:var(--blue-light)}
.abt.geka{color:var(--green);border-color:#7bc4a8}.abt.geka:hover{background:var(--green-light)}
.abt.seikei{color:var(--amber);border-color:#e0b07a}.abt.seikei:hover{background:var(--amber-light)}
.empty{font-size:13px;color:var(--muted);font-style:italic;padding:4px 2px}
.depts{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.dept-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.dept-head{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dept-name{font-size:13px;font-weight:700;flex:1}
.dept-en{font-size:11px;color:var(--muted);margin-left:2px}
.dept-meta{font-size:11px;color:var(--muted)}
.dept-body{padding:10px 16px}
.q-pool{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;margin-bottom:10px}
.q-num{font-family:'DM Mono',monospace;font-size:13px;background:#f5f7fc;border:1px solid #e0e6f2;border-radius:6px;padding:3px 9px;color:var(--text)}
.dept-action{display:flex;align-items:center;gap:10px}
.call-btn{border:none;border-radius:7px;padding:7px 18px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:#fff;transition:opacity .15s}
.call-btn:hover{opacity:.85}
.call-btn:disabled{opacity:.4;cursor:not-allowed}
.calling-label{font-size:13px;color:var(--muted)}
.calling-num{font-family:'DM Mono',monospace;font-size:15px;font-weight:700}
.nai-color{color:var(--blue)}.geka-color{color:var(--green)}.seikei-color{color:var(--amber)}
.link-bar{background:var(--blue-dark);border-radius:var(--radius);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.link-bar span{color:#8fb4d8;font-size:13px}
.link-bar a{color:#7dd4fc;font-size:13px;text-decoration:none;font-family:'DM Mono',monospace}
.link-bar a:hover{text-decoration:underline}
.sync-info{font-size:11px;color:#5a7a9a;margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>受付管理システム</h1>
  <span>Hospital Queue Admin</span>
  <div class="badge" id="sync-badge">● 接続中...</div>
</header>
<main>
  <div class="link-bar">
    <span>サイネージ画面 / Signage:</span>
    <a href="https://sshiromaru.github.io/hospital/signage.html" target="_blank">signage.html を開く →</a>
    <span class="sync-info">GitHub Gist でリアルタイム同期中</span>
  </div>

  <div class="issue-card">
    <div class="issue-left">
      <div class="label">次の発行番号 / Next Ticket</div>
      <div class="num" id="next-num">001</div>
    </div>
    <div class="issue-right">
      <button class="btn-issue" id="btn-issue" onclick="issueTicket()">番号を発行 / Issue Ticket</button>
      <div class="stats">
        <div class="stat"><div class="n" id="stat-unassigned">0</div><div class="l">未割り当て</div></div>
        <div class="stat"><div class="n" id="stat-waiting">0</div><div class="l">待機中</div></div>
        <div class="stat"><div class="n" id="stat-calling">0</div><div class="l">呼び出し中</div></div>
      </div>
    </div>
  </div>

  <div class="pool-card">
    <div class="section-title">未割り当て / Unassigned</div>
    <div class="pool" id="pool-unassigned"><span class="empty">発行後ここに表示されます</span></div>
  </div>

  <div class="depts">
    <div class="dept-card">
      <div class="dept-head"><div class="dot" style="background:#1a56a0"></div><div class="dept-name">内科<span class="dept-en"> / Internal Medicine</span></div><div class="dept-meta">待機: <span id="wc-nai">0</span>人</div></div>
      <div class="dept-body">
        <div class="q-pool" id="q-nai"><span class="empty" style="font-size:12px">なし</span></div>
        <div class="dept-action">
          <button class="call-btn" style="background:#1a56a0" onclick="callNext('nai')" id="cbtn-nai" disabled>次を呼び出す</button>
          <div><div class="calling-label">呼び出し中</div><div class="calling-num nai-color" id="cn-nai">—</div></div>
        </div>
      </div>
    </div>
    <div class="dept-card">
      <div class="dept-head"><div class="dot" style="background:#0e6e50"></div><div class="dept-name">外科<span class="dept-en"> / Surgery</span></div><div class="dept-meta">待機: <span id="wc-geka">0</span>人</div></div>
      <div class="dept-body">
        <div class="q-pool" id="q-geka"><span class="empty" style="font-size:12px">なし</span></div>
        <div class="dept-action">
          <button class="call-btn" style="background:#0e6e50" onclick="callNext('geka')" id="cbtn-geka" disabled>次を呼び出す</button>
          <div><div class="calling-label">呼び出し中</div><div class="calling-num geka-color" id="cn-geka">—</div></div>
        </div>
      </div>
    </div>
    <div class="dept-card">
      <div class="dept-head"><div class="dot" style="background:#8a4f0a"></div><div class="dept-name">整形外科<span class="dept-en"> / Orthopedics</span></div><div class="dept-meta">待機: <span id="wc-seikei">0</span>人</div></div>
      <div class="dept-body">
        <div class="q-pool" id="q-seikei"><span class="empty" style="font-size:12px">なし</span></div>
        <div class="dept-action">
          <button class="call-btn" style="background:#8a4f0a" onclick="callNext('seikei')" id="cbtn-seikei" disabled>次を呼び出す</button>
          <div><div class="calling-label">呼び出し中</div><div class="calling-num seikei-color" id="cn-seikei">—</div></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── Gist 設定 ──────────────────────────────────────────────
const GIST_ID    = '5630a1b3228d47289d8c0722af357bb8';
const GIST_TOKEN = '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';
const GIST_FILE  = 'hospital_queue.json';
const GIST_API   = `https://api.github.com/gists/${GIST_ID}`;
// ────────────────────────────────────────────────────────────

const pad = n => String(n).padStart(3, '0');
let st = defaultState();
let saving = false;

function defaultState() {
  return { nextNum:1, unassigned:[], queues:{nai:[],geka:[],seikei:[]},
           called:{nai:null,geka:null,seikei:null}, lastCalled:{num:null,dept:null} };
}

function setBadge(status, text) {
  const b = document.getElementById('sync-badge');
  b.textContent = text;
  b.className = 'badge ' + status;
}

// ── Gist 読み込み ──
async function loadFromGist() {
  try {
    const res = await fetch(GIST_API + '?t=' + Date.now(), {
      headers: { 'Authorization': 'token ' + GIST_TOKEN }
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const content = data.files[GIST_FILE]?.content;
    if (content && content !== '{}') {
      const parsed = JSON.parse(content);
      // 番号は管理側が常に権威を持つ（ローカルが進んでいれば優先）
      if (parsed.nextNum >= st.nextNum) st = parsed;
    }
    setBadge('ok', '● 同期済み');
    render();
  } catch(e) {
    setBadge('err', '● 同期エラー');
    console.error('Gist load error:', e);
  }
}

// ── Gist 書き込み ──
async function saveToGist() {
  saving = true;
  setBadge('saving', '● 保存中...');
  document.getElementById('btn-issue').disabled = true;
  try {
    const res = await fetch(GIST_API, {
      method: 'PATCH',
      headers: {
        'Authorization': 'token ' + GIST_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: { [GIST_FILE]: { content: JSON.stringify(st) } }
      })
    });
    if (!res.ok) throw new Error(res.status);
    setBadge('ok', '● 同期済み');
  } catch(e) {
    setBadge('err', '● 保存失敗');
    console.error('Gist save error:', e);
  } finally {
    saving = false;
    document.getElementById('btn-issue').disabled = false;
  }
}

// ── 操作 ──
function issueTicket() { st.unassigned.push(st.nextNum++); commit(); }
function assignToDept(num, dept) { st.unassigned = st.unassigned.filter(n=>n!==num); st.queues[dept].push(num); commit(); }
function callNext(dept) {
  if (!st.queues[dept].length) return;
  const num = st.queues[dept].shift();
  st.called[dept] = num; st.lastCalled = {num, dept}; commit();
}
function commit() { render(); saveToGist(); }

// ── 描画 ──
function render() {
  document.getElementById('next-num').textContent = pad(st.nextNum);
  const pool = document.getElementById('pool-unassigned');
  pool.innerHTML = st.unassigned.length
    ? st.unassigned.map(n =>
        `<div class="ticket"><span class="tnum">${pad(n)}</span>
         <div class="assign-btns">
           <button class="abt nai" onclick="assignToDept(${n},'nai')">内科</button>
           <button class="abt geka" onclick="assignToDept(${n},'geka')">外科</button>
           <button class="abt seikei" onclick="assignToDept(${n},'seikei')">整形</button>
         </div></div>`).join('')
    : '<span class="empty">発行後ここに表示されます</span>';

  let totalWaiting = 0, totalCalling = 0;
  ['nai','geka','seikei'].forEach(d => {
    document.getElementById('q-'+d).innerHTML = st.queues[d].length
      ? st.queues[d].map(n=>`<span class="q-num">${pad(n)}</span>`).join('')
      : '<span class="empty" style="font-size:12px">なし</span>';
    document.getElementById('wc-'+d).textContent = st.queues[d].length;
    document.getElementById('cbtn-'+d).disabled = !st.queues[d].length;
    document.getElementById('cn-'+d).textContent = st.called[d] ? pad(st.called[d]) : '—';
    totalWaiting += st.queues[d].length;
    if (st.called[d]) totalCalling++;
  });
  document.getElementById('stat-unassigned').textContent = st.unassigned.length;
  document.getElementById('stat-waiting').textContent = totalWaiting;
  document.getElementById('stat-calling').textContent = totalCalling;
}

// ── 起動 & ポーリング ──
loadFromGist();
setInterval(loadFromGist, 10000); // 10秒ごとに最新を取得
</script>
</body>
</html>
